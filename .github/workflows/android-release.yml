name: Release Build

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref_name }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Resolve version values
        id: version
        run: |
          RAW_TAG="${{ github.event.release.tag_name || github.ref_name }}"
          VERSION_NAME="${RAW_TAG#v}"
          VERSION_CODE="${{ github.run_number }}"

          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          [[ -n "$ANDROID_KEYSTORE_BASE64" ]] || { echo "Missing secret: ANDROID_KEYSTORE_BASE64"; exit 1; }
          [[ -n "$_KEYSTORE_PASSWORD" ]] || { echo "Missing secret: ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          [[ -n "$ANDROID_KEY_ALIAS" ]] || { echo "Missing secret: ANDROID_KEY_ALIAS"; exit 1; }
          [[ -n "$ANDROID_KEY_PASSWORD" ]] || { echo "Missing secret: ANDROID_KEY_PASSWORD"; exit 1; }

      - name: Decode signing keystore
        run: |
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release-keystore.jks"

      - name: Verify keystore credentials
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          keytool -list \
            -keystore "$RUNNER_TEMP/release-keystore.jks" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" >/dev/null

      - name: Build release APK
        env:
          ORG_GRADLE_PROJECT_ciVersionName: ${{ steps.version.outputs.version_name }}
          ORG_GRADLE_PROJECT_ciVersionCode: ${{ steps.version.outputs.version_code }}
          ORG_GRADLE_PROJECT_signingStoreFile: ${{ runner.temp }}/release-keystore.jks
          ORG_GRADLE_PROJECT_signingStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKeyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_signingKeyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: >
          gradle :app:assembleRelease

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          files: app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
