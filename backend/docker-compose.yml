services:
  seniorlauncher-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seniorlauncher-backend
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DEVICE_TOKEN: "change_me_device"
      ADMIN_TOKEN: "change_me_admin"
      ALLOWED_ORIGIN: "http://localhost:8080"
    ports:
      - "8080:8080"
    volumes:
      - ./device-sync-store.json:/app/device-sync-store.json
